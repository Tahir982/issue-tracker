# ── Database ───────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/issue_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────────
app.jwt.secret=IssueTrackerSecretKey2024PAFIASTProjectJWTSigningKey256BitsLong!!
app.jwt.expiration=86400000

# ── Server ─────────────────────────────────────────
server.port=8080
spring.application.name=issue-tracker

# ── Logging ────────────────────────────────────────
logging.level.com.paf.issuetracker=INFO
logging.level.org.springframework.security=WARN
